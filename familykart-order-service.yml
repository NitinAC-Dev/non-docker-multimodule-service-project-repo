spring:
  datasource:
    url: jdbc:mysql://localhost:3307/familykartdb
    username: root
    password: root		

#jpa specific properties
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    producer:
      bootstrap-servers: localhost:9094
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: localhost:9094
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer  # ← changed
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer  # ← added
        spring.json.value.default.type: org.familykart.com.shared.model.ResponseMessage  # ← added
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

topicName: order-events
reduceStockTopicName: reduce-stock-events  

